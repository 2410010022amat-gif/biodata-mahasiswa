<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Mahasiswa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #50c9f4 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            color: #ffffff;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .avatar-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            border: 3px solid #50c9f4;
            overflow: hidden;
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .card-header p {
            font-size: 14px;
            color: #94a3b8;
        }

        .card-body {
            padding: 30px;
            background-color: #f8fafc;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .info-box {
            background-color: #ffffff;
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 4px solid #2575fc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .info-label {
            font-size: 13px;
            font-weight: 700;
            color: #2575fc;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 15px;
            color: #334155;
            font-weight: 500;
        }

        .card-footer {
            background-color: #f1f5f9;
            padding: 20px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
        }

        /* Responsive untuk layar HP */
        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            .card-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <div class="avatar-container">
                <img src="foto.jpg" alt="Foto Profil" id="profile-img">
            </div>
            <h1>Ahmad Tamrani Noprian</h1>
            <p>Mahasiswa Teknik Informatika</p>
        </div>

        <div class="card-body">
            <div class="grid-container">
                
                <div class="info-box">
                    <div class="info-label">NPM :</div>
                    <div class="info-value">2410010022</div>
                </div>

                <div class="info-box">
                    <div class="info-label">Kelas :</div>
                    <div class="info-value">4N REG BJM</div>
                </div>

                <div class="info-box">
                    <div class="info-label">Tempat Lahir :</div>
                    <div class="info-value">Ampah</div>
                </div>

                <div class="info-box">
                    <div class="info-label">Alamat :</div>
                    <div class="info-value">Handil Bakti</div>
                </div>

                <div class="info-box">
                    <div class="info-label">Hobi :</div>
                    <div class="info-value">Healing</div>
                </div>

                <div class="info-box">
                    <div class="info-label">Cita-cita :</div>
                    <div class="info-value">Orang Berguna</div>
                </div>

                <div class="info-box">
                    <div class="info-label">Email :</div>
                    <div class="info-value">amat@email.com</div>
                </div>

                <div class="info-box">
                    <div class="info-label">No. HP :</div>
                    <div class="info-value">08214871224</div>
                </div>

            </div>
        </div>

        <div class="card-footer">
            &copy; 2026 | Biodata Mahasiswa - Ahmad Tamrani Noprian
        </div>
    </div>

</body>
</html>
